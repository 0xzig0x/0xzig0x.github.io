# Tema
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"

# Información del sitio
locale: "es-ES"
title: "0xzig0x"
title_separator: "|"
subtitle: "Red Team & Pentesting"
name: "0xzig0x"
description: "Apasionado y estudiante de ciberseguridad especializado en Red Team y Pentesting"
url: "https://0xzig0x.github.io"
baseurl: ""
repository: "0xzig0x/0xzig0x.github.io"
masthead_title: "0xzig0x"
breadcrumbs: true

# Incluir carpetas personalizadas
include:
  - _pages

# Autor
author:
  name: "0xzig0x"
  avatar: "/assets/images/b.jpg"
  bio: "Apasionado y estudiante de ciberseguridad especializado en Red Team y Pentesting"
  location: "Colombia"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/0xzig0x"
    - label: "0xzig0x@proton.me"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:0xzig0x@proton.me"
    - label: "0xzig0x"
      icon: "fab fa-fw fa-discord"
      url: "https://discord.com/users/0xzig0x"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/0xzig0x"

# Configuración de posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Archivos
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Búsqueda
search: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Markdown
markdown: kramdown

# Paginación
paginate: 10
paginate_path: /page:num/
